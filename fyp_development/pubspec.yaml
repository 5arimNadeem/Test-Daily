name: test_daily_application
description: "Test Daily - A daily companion app for software testers and QA engineers"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Networking
  dio: ^5.7.0

  # Secure Key Storage
  flutter_secure_storage: ^9.2.4

  # Connectivity
  connectivity_plus: ^6.1.0

  # Image Caching
  cached_network_image: ^3.4.1

  # URL Launching — open articles in browser and YouTube videos in the YouTube app
  url_launcher: ^6.3.1

  # XML parsing — for RSS feed content
  xml: ^6.5.0

  # Typography
  google_fonts: ^6.2.1

  # Firebase (stubbed for future push notifications)
  firebase_core: ^3.8.1
  firebase_messaging: ^15.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/images/
